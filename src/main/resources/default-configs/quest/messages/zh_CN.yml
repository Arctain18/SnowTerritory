# 任务模块消息（唯一来源，主 config 不重复）
# 每条消息可为单行字符串，或为字符串列表；列表将按行依次显示在聊天栏（多行）。
bounty-announcement: "&6✦ &e[悬赏任务] &f{quest} &8| &7完成任务可获得丰厚奖励"
# VIP3 悬赏刷新前 5 分钟预告；{vip} {material}
bounty-vip3-preview: "&8*{vip}&7：你夜观天象，冥冥中似乎传来了 &e{material} &7的感应。"
bounty-hover-area: "&8━━━━━━━━━━━━━━━━━━\n&6◆ 任务区域\n&7{area}\n&8━━━━━━━━━━━━━━━━━━"
accepted: "&a✓ &f已接取任务: &e{quest}"
accept-failed: "&c✗ &f当前没有符合你档位难度要求的任务，请稍后重试"
quest-completed: "&a✓ &f任务完成！获得奖励: &e{rewards}"
expired: "&c✗ &f任务已过期"
quest-progress: "&7任务进度: &e{current}&7/&e{required}"
quest-not-found: "&c✗ &f未找到任务"
already-active: "&c✗ &f你已有进行中的任务"
reward-questpoint: "&a+{amount} 成就点数"
reward-currency: "&a+{amount}x {currency}"
# {tier} 与列表进度条一致：按当前/需求比例分档，颜色同 quest/config.yml → list-progress 的 low/mid/high-color
material-submitted: "&a✓ &{#5BBFC7}交付 {item} &7x{amount}&8 ({tier}{current}&8/&7{required}&8)"
list-header: "&7------------- &{#FFD700}&l任务列表 &7------------- "
# 列表第一行由代码拼装（前缀 + 任务描述 + 分隔 + 状态）；整行悬停显示 list-item-hover
list-item-prefix: "    &7▸ &e"
list-item-sep: " &8| "
# {tierName}=难度档名(已含颜色); {matLetter}=材料等级字母 A-Z; {difficulty}=难度 1-32
list-item-hover: "&7任务难度: {tierName} {matLetter}{difficulty}"
list-item: "    &7▸ &e{quest} &8| {status}"
# 任务一行进度；VIP 时程序会在行尾追加「ES 库存」片段（带悬停，见 list-progress-es-*）
list-progress: "&7      &l▸&r 进度: {bar}{fraction}"
# VIP 进度行尾：可见标签（不含 VIP 名）；悬停文案支持 {vip}；{amount}=本任务材料在 ES 总数量
list-progress-es-label: " &{#6dc97f}ES &7库存"
list-progress-es-hover: "&f{vip}&8权限: &7远程&{#3ab835}E&{#6dc97f}S&7访问"
list-progress-es-tail: "&7: &3{amount}"
# 条后数字/括号；{tier} 同 material-submitted，与进度条填充色分档一致
list-fraction: "&8 ({tier}{current}&8/&7{required}&8)"
list-rating: "&7      &l▸&r 评级: &e{currentRating}"
list-empty: "&7暂无进行中的任务"
bounty-completed: "&a✓ &f悬赏任务完成！使用 &e/sn q complete &f领取奖励"
bounty-claimed: "&a✓ &f已领取 &e{count} &f个悬赏任务奖励"
completion: 
- "&a✓ &f任务完成！评级: &e{rating} "
- "        &a+ &7{questpoint} &{#4a8ba1}星尘 &8| &a+ &7{currency} &{#ffd500}成就点 &7(倍数: {multiplier}x)"
no-completed-bounty: "&c✗ &f没有已完成的悬赏任务可领取"
complete-no-permission: "&c✗ &f你不是 VIP，无法使用远程提交"
complete-target-denied: "&c✗ &f仅 OP 可指定其他玩家"
complete-target-not-found: "&c✗ &f未找到在线玩家: {name}"
complete-usage-console: "&e用法: /sn q complete <player>"
complete-remote-limit: "&c✗ &f今日远程提交次数已用尽: {used}/{limit}"
complete-free-limit: "&c✗ &f今日免材料次数已用尽: {used}/{limit}"
complete-free-only-vip3: "&c✗ &f仅 VIP3 可使用免材料领奖"
complete-summary: "&a✓ &f提交完成: 背包提交 &e{inv}&f，ES 提交 &e{es}&f，完成普通任务 &e{normal}&f，领取悬赏 &e{bounty}"
complete-free-mode-applied: "&d✦ &f本次免材料模式已生效，奖励倍率: &e0.6x"
reload-done: "&a✓ &f任务配置已重载"
kill-not-implemented: "&c✗ &f击杀任务尚未实现"
already-completed: "&e⚠ &f该任务已完成"
no-permission: "&c✗ &f没有权限"
player-only: "&c✗ &f此命令仅限玩家使用"
setlevel-usage: "&e用法: /sn q setlevel <等级> [玩家]"
setlevel-invalid: "&c✗ &f{reason}"
setlevel-player-not-found: "&c✗ &f未找到玩家: {name}"
setlevel-success: "&a✓ &f已设置 {player} 的材料任务等级为 {level}"
getlevel-success: "&a✓ &f{player} 的材料任务等级: {level}"
collect-success-title: "&a采集成功"
collect-success-subtitle: "&7+1 {crop}"
collect-inventory-full: "&e⚠ &f背包已满！部分物品已掉落在地上。"
