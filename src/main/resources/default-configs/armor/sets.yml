## 制式防具套装配置示例

sets:
  c1_standard:
    display-name: "&{#FF6200}天师府制式"
    base:
      set: c1_standard
      required-level: 0
      lore:
        - '   &7来源: <#3c79cf>清<#385de7>澜<#3341ff>渡'
        - '&f鋈 <GRADIENT:#FF6600:#FF6600>可强化'
      dye-color: 105 41 0
    slot-materials:
      helmet: LEATHER_HELMET
      chestplate: LEATHER_CHESTPLATE
      leggings: LEATHER_LEGGINGS
      boots: LEATHER_BOOTS
    # 基础属性（用于整套的理论总值）
    base-stats:
      defense: 100
      max-health: 40
      toughness: 15
      dodge: 5

    # 部位系数（四件合计建议为 1.0）
    slot-ratios:
      helmet: 0.25
      chestplate: 0.4
      leggings: 0.2
      boots: 0.15

    # 属性范围倍率（可选，叠加在全局 random 配置之上）
    stat-ranges:
      defense:
        min-multiplier: 0.9
        max-multiplier: 1.1
      max-health:
        min-multiplier: 0.85
        max-multiplier: 1.15
      toughness:
        min-multiplier: 0.9
        max-multiplier: 1.1
      dodge:
        min-multiplier: 0.9
        max-multiplier: 1.1

    # 套装生成费用（可选，不填则使用 armor/config.yml 的 generation-cost 默认）
    generation-cost:
      mode: additive
      level-threshold: 20
      sl-base: 2000
      qp-base: 168
      sl-per-level: 25
      qp-per-level: 2

  flame_vanguard:
    display-name: "焰誓先锋"
    base:
      set: flame_vanguard
      required-level: 0
      lore:
        - '   &7来源: &{#ff7a18}焰&{#af002d}誓'
        - '&f鋈 <GRADIENT:#FF6600:#FF6600>可强化'
      dye-color: 105 41 0
    slot-materials:
      helmet: LEATHER_HELMET
      chestplate: LEATHER_CHESTPLATE
      leggings: LEATHER_LEGGINGS
      boots: LEATHER_BOOTS
    base-stats:
      defense: 80
      max-health: 60
      toughness: 10
      dodge: 8
    slot-ratios:
      helmet: 0.22
      chestplate: 0.42
      leggings: 0.2
      boots: 0.16

    generation-cost:
      mode: additive
      level-threshold: 20
      sl-base: 2400
      qp-base: 180
      sl-per-level: 30
      qp-per-level: 3

