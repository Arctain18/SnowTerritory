## 制式防具套装配置示例

sets:
  frost_guard:
    display-name: "&{#70F4FF}冰霜守卫"
    # 基础属性（用于整套的理论总值）
    base-stats:
      defense: 100
      max-health: 40
      toughness: 15
      dodge: 5

    # 部位系数（四件合计建议为 1.0）
    slot-ratios:
      helmet: 0.25
      chestplate: 0.4
      leggings: 0.2
      boots: 0.15

    # 属性范围倍率（可选，叠加在全局 random 配置之上）
    stat-ranges:
      defense:
        min-multiplier: 0.9
        max-multiplier: 1.1
      max-health:
        min-multiplier: 0.85
        max-multiplier: 1.15
      toughness:
        min-multiplier: 0.9
        max-multiplier: 1.1
      dodge:
        min-multiplier: 0.9
        max-multiplier: 1.1

  flame_vanguard:
    display-name: "焰誓先锋"
    base-stats:
      defense: 80
      max-health: 60
      toughness: 10
      dodge: 8
    slot-ratios:
      helmet: 0.22
      chestplate: 0.42
      leggings: 0.2
      boots: 0.16

