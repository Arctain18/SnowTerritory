gui:
  # GUI标题 支持chatcolor解析
  title: "[&{#3ab835}&l末影&{#6dc97f}&l存储&8]"

  # GUI大小 (必须是9的倍数，如9, 18, 27, 36, 45, 54)
  size: 54

  # 槽位配置 (0-53)
  slots:
    # 上一页
    previous-page: 48
    # 下一页
    next-page: 50

    # 物品槽位 (支持范围表达式)
    material-slots: [ "28-34", "37-43" ]

    # 装饰槽位
    decoration-slots:
      "0-17":
        material: "GREEN_STAINED_GLASS_PANE"
        name: "&{#d6fff6}&m-&{#fffad6}&m=&{#FFFFFF}&m-&8 [&{#3ab835}末影&{#6dc97f}存储&8] &{#FFFFFF}&m-&{#fffad6}&m=&{#d6fff6}&m-"
        lore:
          - ""
      "18-53":
        material: "BLACK_STAINED_GLASS_PANE"
        name: "&{#d6fff6}&m-&{#fffad6}&m=&{#FFFFFF}&m-&8 [&{#3ab835}末影&{#6dc97f}存储&8] &{#FFFFFF}&m-&{#fffad6}&m=&{#d6fff6}&m-"
        lore:
          - ""

  # 默认物品 lore 模板，占位符:
  # {amount} 当前库存
  # {max}/{max_amount} 非VIP上限（受物品配置和权限上限共同约束）
  # {vip_max_amount} 含VIP加成后的上限
  # {vip} VIP彩色称号
  # {vip_bonus_percent} VIP加成百分比（按基础上限计算）
  # {task_category} 任务分类（物品可单独配置）
  # {task_level} 任务等级（物品可单独配置）
  # {task_location} 任务地点（物品可单独配置）
  # {item_display} 物品显示名
  # VIP玩家会把 {max_amount}/{max} 自动替换为 gui.vip-max-suffix-format
  vip-max-suffix-format: "{vip_max_amount} &8({vip} &a+&f{vip_bonus_percent}%&8)"
  default-lore:
    - "&{#d6fff6}&m-&{#fffad6}&m=&{#FFFFFF}&m-----------------&{#fffad6}&m=&{#d6fff6}&m-"
    - ""
    - "  &7{task_category} &8- &7[&fLv.{task_level}&7]"
    - "  &{#4d99eb}&l◈ &f{task_location}"
    - ""
    - "&{#d6fff6}&m-&{#fffad6}&m=&{#FFFFFF}&m-----------------&{#fffad6}&m=&{#d6fff6}&m-"
    - " &8| &7左键 &8▸ &{#55ff55}存入 &f8 &7个"
    - " &8| &7SHIFT&8 + &7左键 &8▸ &{#55ff55}存入 &f64 &7个"
    - " &8| &7右键 &8▸ &{#ff5555}取出 &f8 &7个"
    - " &8| &7SHIFT&8 + &7右键 &8▸ &{#ff5555}取出 &f64 &7个"
    - ""
    - " &b|| &{#3ab835}E&{#6dc97f}S &7库存: &{#42ddeb}{amount} &8/ &7{max_amount}"

  # 物品顺序与分组（只展示出现在这里并且在白名单中的物品）
  materials:
    MM_DROPS:
      优质狼皮:
        max: 256
      瓶装兽血:
        max: 256
      狼王獠牙:
        max: 128
        task-category: "任务材料"
        task-level: "5"
        task-location: "&{#b89b98}野狼 &8(3686,3603)"
  # 注意:
  # 1. 如果物品配置为数字（如 "优质狼皮: 256"），等价于 {max: 256}，同样会使用上面的 default-lore
  # 2. 如果某个物品需要单独的提示，可以在该物品下增加 lore 节点覆盖默认值:
  #    示例:
  #      某物品:
  #        max: 64
  #        task-category: "任务材料"
  #        task-level: "5"
  #        task-location: "&f野狼 &8(3686,3603)"
  #        lore:
  #          - "&7自定义第一行"
  #          - "&7自定义第二行"
