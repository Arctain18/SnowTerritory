# ============================================
# 强化系统配置（Reinforce 模块专用配置文件）
# ============================================

reinforce:
  # 失败时降级概率 (0.0-1.0)
  fail-degrade-chance: 0.3

  # 维持不变概率 (0.0-1.0)
  maintain-chance: 0.2

  # 成功时属性增加百分比 (例如: 1.1 表示 +10%)
  attribute-boost-percent: 1.1

  # 不同等级的成功概率 (0.0-1.0)
  success-rates:
    level-0: 0.9
    level-1: 0.8
    level-2: 0.7
    level-3: 0.6
    level-4: 0.5
    level-5: 0.4
    level-6: 0.3
    level-7: 0.25
    level-8: 0.2
    level-9: 0.15
    level-10: 0.1

  # 可强化物品列表 (基于MMOItems物品ID匹配，需要精确匹配)
  # 如果列表为空，则允许所有MMOItems物品强化
  # 示例: 如果MMOItems物品ID为 "MY_SWORD"，则配置为 "MY_SWORD"
  reinforceable-items:
    - "弓箭手1"

  # 可强化属性列表 (只强化配置中指定的属性)
  # 属性ID需要大写，例如: ATTACK_DAMAGE, DEFENSE, MAX_HEALTH 等
  # 如果不配置或列表为空，则不会强化任何属性
  reinforceable-attributes:
    - "ATTACK_DAMAGE"
    - "DEFENSE"
    - "MAX_HEALTH"

  # 消耗配置
  cost:
    # Vault金币消耗 (设置为0禁用)
    vault-gold: 0

    # PlayerPoints点券消耗 (设置为0禁用)
    player-points: 0

    # 所需材料数量 (检查GUI中的6个材料槽位)
    materials: 0

  # 保护符配置
  # 保护符必须是MMOItems指定type的物品
  # 保护符lore中"+"后面的数字代表能保护的最高强化等级
  # 例如: lore中包含 "+5" 表示能保护到+5等级，+6及以上失效
  preservation-token:
    # MMOItems的type (默认: PRESERVATION_TOKEN)
    type: "PRESERVATION_TOKEN"

  # 强化符配置
  # 强化符必须是MMOItems指定type的物品
  # 强化符lore中"+"后面的数字代表能提升概率的最高强化等级
  # 强化符lore中"%"前面的数字代表能提升的概率数值
  # 例如: lore中包含 "+5" 和 "10%" 表示能提升到+5等级，提升10%概率
  upgrade-token:
    # MMOItems的type (默认: UPGRADE_TOKEN)
    type: "UPGRADE_TOKEN"

# ============================================
# GUI界面配置（强化模块）
# ============================================
gui:
  # GUI标题 (支持16进制颜色，不能使用渐变)
  title: "&{#5B9BD5}✦ &{#7BBAF7}SnowTerritory &{#C9AE59}强化工坊 &{#5B9BD5}✦"

  # GUI大小 (必须是9的倍数，如9, 18, 27, 36, 45, 54)
  size: 54

  # 槽位配置 (0-53)
  slots:
    weapon: 10
    protect-charm: 12
    enhance-charm: 14
    materials:
      1: 28
      2: 29
      3: 30
      4: 37
      5: 38
      6: 39
    confirm: 22
    cancel: 40

  # 按钮名称 (支持颜色代码 &)
  confirm-button: "&a&l✦ 确认强化"
  cancel-button: "&c&l✕ 取消"

  # 确认按钮Lore配置 (支持颜色代码和占位符)
  confirm-button-lore:
    click-hint: "&8▸ 点击此处确认强化"
    separator: "&8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    current-level: "&f等级 &e+{currentLevel} &7→ &a+{nextLevel}"
    success-rate: "&f成功率 &a{successRate}%{bonus}"
    fail-degrade-chance: "&f失败降级 &c{chance}%{protect}"
    protect-charm-expired: "&c&o保护符失效 &7(最高保护 +{maxLevel})"
    protect-charm-invalid: "&c&o保护符无效 &7(类型不匹配)"
    enhance-charm-expired: "&c&o强化符失效 &7(最高强化 +{maxLevel})"
    enhance-charm-invalid: "&c&o强化符无效 &7(类型不匹配或概率解析失败)"
    cost-title: "&6◆ 本次消耗"
    cost-gold: "&7金币 &8| {color}{amount}"
    cost-points: "&7点券 &8| {color}{amount}"
    cost-materials: "&7材料 &8| {color}{current}&7/&f{required}"
    next-cost-title: "&6◆ 下一级预估消耗"

  # 玩家信息显示配置
  player-info:
    enabled: true
    slot: 49
    title: "&f&l◆ 玩家信息"
    format:
      - "&8━━━━━━━━━━━━━━━━━━"
      - "&f{playerName} &7· &aLv.{playerLevel}"
      - "&7职业 &b{className}"
      - "&7金币 &6{gold} &8| &7点券 &d{points}"
      - "&8━━━━━━━━━━━━━━━━━━"

  # 自定义槽位 (装饰用)
  custom-slots:
    0-53:
      material: "LIGHT_BLUE_STAINED_GLASS_PANE"
      name: " "
      lore: []

# ============================================
# 消息配置（强化模块相关）
# ============================================
messages:
  # 消息前缀 (所有带前缀的消息都会使用这个前缀)
  prefix: "&{#4a95ff}ST <g:#C97759:#C9AE59>Reinforce</g> &{#4a95ff}&l>&{#99c2ff}&l>&{#ffffff}&l> "

  # 命令相关消息
  command:
    # 无权限提示
    no-permission: "&c✗ &f您没有权限使用此命令！"
    # 仅限玩家使用的提示
    player-only: "&c✗ &f此命令仅限玩家使用！"
    # 未知命令提示
    # 占位符: {label} - 命令标签
    unknown-command: "&c✗ &f未知的子命令！输入 /{label} 查看帮助。"
    # 重载成功提示
    reload-success: "&a✓ &f插件配置已重载！"

  # 强化相关消息
  reinforce:
    # 无效物品提示
    invalid-item: "&c✗ &f此物品不可强化！"
    # 不可强化提示
    not-reinforceable: "&c✗ &f此物品不可强化！"
    # 金币不足提示
    # 占位符: {cost} - 需要的金币数量 (已格式化，包含颜色代码)
    insufficient-gold: "&c✗ &f金币不足！需要: &e{cost}"
    # 点券不足提示
    # 占位符: {cost} - 需要的点券数量 (已格式化，包含颜色代码)
    insufficient-points: "&c✗ &f点券不足！需要: &e{cost}"
    # 材料不足提示
    # 占位符: {count} - 需要的材料数量 (已格式化，包含颜色代码)
    insufficient-materials: "&c✗ &f强化材料不足！需要: &e{count} &f个"
    # 强化成功标题
    success-title: "&a&l✓ 强化成功！"
    # 强化成功等级提示
    # 占位符: {level} - 新的强化等级 (数字)
    success-level: "&7等级提升至: &a&l+{level}"
    # 强化失败标题
    fail-title: "&c&l✗ 强化失败！"
    # 强化失败等级提示
    # 占位符: {level} - 新的强化等级 (数字)
    fail-level: "&7等级下降至: &c&l+{level}"
    # 强化维持标题
    maintain-title: "&e&l⚠ 强化维持不变"
    # 强化维持描述
    maintain-desc: "&7物品等级未发生变化"
    # 强化错误提示
    # 占位符: {error} - 错误消息文本
    error: "&c✗ &f强化过程中发生错误: &e{error}"
    # 强化取消提示
    cancelled: "&e⚠ &f强化已取消。"

  # 物品信息相关消息
  item:
    # 未手持物品提示
    no-item: "&c✗ &f请手持一个物品！"
    # 非MMOItems物品提示
    not-mmoitem: "&e⚠ &f这不是一个 MMOItems 物品！"
    # 获取物品信息错误提示
    # 占位符: {error} - 错误消息文本 (仅在异常时使用)
    info-error: "&c✗ &f无法获取物品信息！"
    # 物品信息标题
    info-title: "物品信息"
    # 物品类型显示
    # 占位符: {type} - 物品类型 (如: "SWORD", "AXE", "BOW")
    info-type: "&6类型: &f{type}"
    # 物品ID显示
    # 占位符: {id} - MMOItems物品的唯一标识符
    info-id: "&6 ID: &e&l{id}"

  # 帮助信息
  help:
    # 帮助标题
    title: "SnowTerritory 命令帮助"
    # 强化命令帮助
    reinforce: "&e/sn reinforce &7- &f打开物品强化界面"
    # 重载命令帮助
    reload: "&e/sn reload &7- &f重载插件配置"
    # 查看ID命令帮助
    checkid: "&e/sn checkID &7- &f查看手中物品的MMOItems ID"

  # GUI相关消息
  gui:
    # 背包满时警告消息
    inventory-full: "&e⚠ &f背包已满！部分物品已掉落在地上。"

  # 分隔线 (用于美化消息显示)
  separator: "&8&m                                        "
