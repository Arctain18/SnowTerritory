  - { id: world_twilight_wanderer, name: "暮色漫游者", description: "游走于昼夜交界的存在，鳞色随光影变幻。西海岸的传说。", length-min: 0.6, length-max: 1.5, material: COD }
  - { id: world_eternal_flow, name: "永恒之流", description: "象征时间之河的存在，据说见证过大陆的变迁。", length-min: 0.7, length-max: 1.8, material: SALMON }
  - { id: world_silent_depth, name: "静默深渊", description: "从不发出声响的鱼，栖息于世界最寂静的深海。", length-min: 0.6, length-max: 1.6, material: COD }
  - { id: world_coral_memory, name: "珊瑚记忆", description: "承载古老珊瑚礁记忆的灵鱼，鳞片如千年珊瑚。", length-min: 0.4, length-max: 1.0, material: TROPICAL_FISH }
  - { id: world_glacier_heart, name: "冰川之心", description: "北地冰川深处的冰心之灵，触碰如触寒冰之魂。", length-min: 0.7, length-max: 1.7, material: SALMON }
  - { id: world_delta_soul, name: "河口之魂", description: "汇聚百川的河口孕育之灵，身负万千支流的记忆。", length-min: 0.5, length-max: 1.3, material: COD }
  - { id: world_archipelago_echo, name: "群岛回响", description: "在群岛间回荡的传说之鱼，其存在如海风中的低语。", length-min: 0.6, length-max: 1.5, material: TROPICAL_FISH }
