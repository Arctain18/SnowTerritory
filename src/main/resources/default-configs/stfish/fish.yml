# ST Fish 鱼种配置
# fish-types: 15 种鱼，每类一份配置，自动展开为 common(01)/rare(02)/epic(03)/legendary(04)
# lore 为现实中外貌与特性描述，四品质共用
# storm/world 单独配置

fish-types:
  - { type: cod_01, name: "鳕鱼", lore: "&7北大西洋冷水鱼，体长可达1.2米，背部灰褐色，腹部银白，肉质细嫩。", length-min: 0.5, length-max: 1.2, material: COD }
  - { type: salmon_01, name: "鲑鱼", lore: "&7洄游性鱼类，体侧有黑色斑点，成年后体色变红，肉质鲜美富含油脂。", length-min: 0.6, length-max: 1.5, material: SALMON }
  - { type: tropical_01, name: "热带鱼", lore: "&7珊瑚礁小型鱼，体色斑斓多变，常见蓝黄红等鲜艳条纹。", length-min: 0.1, length-max: 0.3, material: TROPICAL_FISH }
  - { type: puffer_01, name: "河豚", lore: "&7遇险时吸水膨胀成球状，体表有细刺，部分种类含河豚毒素。", length-min: 0.2, length-max: 0.5, material: PUFFERFISH }
  - { type: carp_01, name: "鲤鱼", lore: "&7淡水常见鱼，体侧扁，口部有两对须，鳞片大而圆，适应性强。", length-min: 0.4, length-max: 1.0, material: COD }
  - { type: perch_01, name: "鲈鱼", lore: "&7溪流湖泊掠食者，背鳍分两片，体侧有深色竖纹，吻部尖。", length-min: 0.3, length-max: 0.8, material: SALMON }
  - { type: trout_01, name: "鳟鱼", lore: "&7冷水溪流鱼，体侧有红点与黑色斑点，尾鳍分叉，游速敏捷。", length-min: 0.4, length-max: 1.0, material: SALMON }
  - { type: bass_01, name: "鲈鲉", lore: "&7近海礁石区底栖鱼，头大嘴阔，体色斑驳与礁石相近，善伪装。", length-min: 0.3, length-max: 0.7, material: COD }
  - { type: bream_01, name: "鲷鱼", lore: "&7浅海沙底银鳞鱼，体侧扁高，呈银白色带淡红光泽，肉质紧实。", length-min: 0.2, length-max: 0.6, material: COD }
  - { type: flounder_01, name: "比目鱼", lore: "&7扁平底栖鱼，两眼同侧，体色可随沙底变化，常侧卧沙中。", length-min: 0.3, length-max: 0.8, material: COD }
  - { type: mackerel_01, name: "鲭鱼", lore: "&7流线型群游鱼，背蓝腹银，体侧有波浪状深色条纹，游速极快。", length-min: 0.3, length-max: 0.6, material: COD }
  - { type: herring_01, name: "鲱鱼", lore: "&7北大西洋银色小鱼，成群洄游，鳞片细小闪亮，是重要经济鱼种。", length-min: 0.2, length-max: 0.5, material: COD }
  - { type: sardine_01, name: "沙丁鱼", lore: "&7小型群居鱼，体细长银白，常密集游动形成银色鱼群。", length-min: 0.15, length-max: 0.25, material: COD }
  - { type: anchovy_01, name: "凤尾鱼", lore: "&7地中海小型银鱼，体细长，吻尖突出，常制成鱼露或罐头。", length-min: 0.1, length-max: 0.2, material: COD }
  - { type: tilapia_01, name: "罗非鱼", lore: "&7淡水养殖鱼，体侧扁，鳞片大，耐低氧，原产非洲现广泛引种。", length-min: 0.3, length-max: 0.6, material: COD }

storm:
  - { id: storm_north_01, name: "雷暴冰鳞", lore: "&7雷暴中诞生的北境银鳞", length-min: 0.5, length-max: 1.2, material: COD }
  - { id: storm_south_01, name: "风暴暗鳍", lore: "&7风暴席卷的深渊暗色鱼", length-min: 0.4, length-max: 1.0, material: COD }
  - { id: storm_east_01, name: "东溟雷纹", lore: "&7东海雷暴中游走的迅捷鱼", length-min: 0.5, length-max: 1.1, material: SALMON }
  - { id: storm_west_01, name: "暴雨金鳞", lore: "&7暴雨洗礼的西域金鳞", length-min: 0.3, length-max: 0.8, material: TROPICAL_FISH }
  - { id: storm_highland_01, name: "风暴霜吻", lore: "&7风暴过境高地冰湖的霜吻鱼", length-min: 0.4, length-max: 1.0, material: SALMON }
  - { id: storm_coast_01, name: "浪涛纹鱼", lore: "&7暴风浪涛中的海岸纹鱼", length-min: 0.3, length-max: 0.7, material: COD }
  - { id: storm_abyss_01, name: "雷渊裂隙", lore: "&7雷暴照亮的深渊裂隙影鱼", length-min: 0.5, length-max: 1.3, material: COD }
  - { id: storm_fjord_01, name: "风暴银影", lore: "&7风暴峡湾中的银影鱼", length-min: 0.5, length-max: 1.2, material: SALMON }
  - { id: storm_coral_01, name: "暴雨幻影", lore: "&7暴雨中珊瑚礁的幻影鱼", length-min: 0.2, length-max: 0.5, material: TROPICAL_FISH }
  - { id: storm_tundra_01, name: "冰风暴心", lore: "&7冰风暴下的冻原冰心鱼", length-min: 0.4, length-max: 1.0, material: COD }
  - { id: storm_marsh_01, name: "雷雨雾鳞", lore: "&7雷雨笼罩沼泽的雾鳞鱼", length-min: 0.3, length-max: 0.7, material: COD }
  - { id: storm_reef_01, name: "风暴暗流", lore: "&7风暴掀起的礁石暗流迅鱼", length-min: 0.35, length-max: 0.8, material: TROPICAL_FISH }
  - { id: storm_glacier_01, name: "暴雪银魂", lore: "&7暴雪冰川融水中的银魂鱼", length-min: 0.5, length-max: 1.2, material: SALMON }
  - { id: storm_bay_01, name: "雷暴星点", lore: "&7雷暴下海湾的星点鱼", length-min: 0.25, length-max: 0.6, material: COD }
  - { id: storm_canyon_01, name: "峡谷雷心", lore: "&7峡谷急流雷暴中的雷心鱼", length-min: 0.4, length-max: 1.0, material: COD }
  - { id: storm_lagoon_01, name: "风暴碧波", lore: "&7风暴泻湖的碧波鱼", length-min: 0.3, length-max: 0.7, material: TROPICAL_FISH }
  - { id: storm_delta_01, name: "暴雨泥金", lore: "&7暴雨河口三角洲的泥金鱼", length-min: 0.35, length-max: 0.8, material: COD }
  - { id: storm_plateau_01, name: "暴雪雪鳞", lore: "&7高原暴雪中的雪鳞鱼", length-min: 0.4, length-max: 1.0, material: SALMON }
  - { id: storm_grotto_01, name: "雷光幽影", lore: "&7雷光映照洞窟的幽光鱼", length-min: 0.2, length-max: 0.5, material: TROPICAL_FISH }
  - { id: storm_savanna_01, name: "雨季风暴", lore: "&7草原雨季风暴水塘的鱼", length-min: 0.25, length-max: 0.6, material: COD }
  - { id: storm_volcano_01, name: "风暴温泉", lore: "&7风暴与火山温泉交汇的耐热鱼", length-min: 0.3, length-max: 0.7, material: COD }
  - { id: storm_archipelago_01, name: "风暴浪花", lore: "&7风暴群岛海域的浪花鱼", length-min: 0.4, length-max: 0.9, material: SALMON }
  - { id: storm_mangrove_01, name: "暴雨林影", lore: "&7暴雨红树林根间的影鱼", length-min: 0.25, length-max: 0.6, material: COD }

world:
  - { id: tide_forget_river_carp, name: "{#1a237e>}忘川鲤{#4a148c<}", lore: "&7逆流而上的暗紫鲤鱼，鳞片在潮汐与星光间折射出幽蓝光辉，似在追逐被遗忘的记忆。", broadcast: "&7日月起落，星光绽于你我之间", length-min: 0.6, length-max: 1.4, material: SALMON }
  - { id: tide_starfall_drum, name: "{#283593>}落星鮸{#6a1b9a<}", lore: "&7夜空坠落的星屑化作牠的鳞片，银紫光点随潮汐起伏，如同沉睡在海面的流星雨。", broadcast: "&7夜色低垂，银色的雨在天幕上沉睡", length-min: 0.5, length-max: 1.1, material: COD }
  - { id: tide_frostsong_salmon, name: "{#3949ab>}霜歌鲑{#7e57c2<}", lore: "&7游弋于寒潮边界，呼吸间溢出薄霜，尾鳍划过水面时，会留下一段仿若歌声的冰痕。", broadcast: "&7何处吹来的清风，带走覆雪的只言片语", length-min: 0.7, length-max: 1.6, material: SALMON }
  - { id: tide_nightchase_bass, name: "{#1a237e>}逐夜鲈{#8e24aa<}", lore: "&7专爱追逐退潮后的幽暗浪头，双眸如冷紫灯火，在无尽长夜中猎逐一切逼近黎明的光。", broadcast: "&7冰冷的血在心脏中流动，我们学会了拒绝黎明。", length-min: 0.6, length-max: 1.5, material: COD }
  - { id: tide_drifting_whale, name: "{#283593>}浮生鲸{#9c27b0<}", lore: "&7潮水是牠的被褥，星空是牠的眼眸。巨大的身影随潮起潮落缓缓浮沉，似在梦中回望逝去的万千浮生。", broadcast: "&7浮生若梦，为欢几何？", length-min: 1.8, length-max: 4.0, material: TROPICAL_FISH }
