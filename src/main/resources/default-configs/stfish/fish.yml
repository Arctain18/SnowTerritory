  - { id: world_tide_singer, name: "{#00bcd4>}潮汐歌者{#0097a7<}", lore: "&7传说在潮起潮落时歌唱，其声能抚平海浪。来自东海之滨的古老存在。", length-min: 0.8, length-max: 2.0, material: TROPICAL_FISH }
  - { id: world_abyss_whisper, name: "{#0d47a1>}深渊低语者{#263238<}", lore: "&7栖息于世界最深的裂隙，据说能听见深渊的私语。", length-min: 0.7, length-max: 1.8, material: COD }
  - { id: world_northern_guardian, name: "{#4fc3f7>}北境守望者{#0288d1<}", lore: "&7冰封之海的守护之灵，鳞片如千年寒冰。", length-min: 0.9, length-max: 2.2, material: SALMON }
  - { id: world_southern_dream, name: "{#f48fb1>}南溟梦游者{#ec407a<}", lore: "&7南方温暖海域的梦之化身，游走于现实与幻梦之间。", length-min: 0.6, length-max: 1.5, material: TROPICAL_FISH }
  - { id: world_starfall_child, name: "{#969dff>}星落之子{#f0ff91<}", lore: "&7传说为坠星所化，鳞间闪烁星辰余晖。诞生于西陆高原的圣湖。", length-min: 0.5, length-max: 1.3, material: COD }
  - { id: world_moon_reflection, name: "{#e1bee7>}月影倒映{#ce93d8<}", lore: "&7只在满月之夜浮现的幻鱼，如水中倒映的月影。东方的传说之鱼。", length-min: 0.6, length-max: 1.4, material: SALMON }
  - { id: world_sunrise_herald, name: "{#ffd54f>}破晓使者{#ffc107<}", lore: "&7伴随第一缕曙光出现的鱼，被东方渔民视为吉兆。", length-min: 0.5, length-max: 1.2, material: TROPICAL_FISH }
  - { id: world_twilight_wanderer, name: "{#ce93d8>}暮色漫游者{#ba68c8<}", lore: "&7游走于昼夜交界的存在，鳞色随光影变幻。西海岸的传说。", length-min: 0.6, length-max: 1.5, material: COD }
  - { id: world_eternal_flow, name: "{#26a69a>}永恒之流{#00897b<}", lore: "&7象征时间之河的存在，据说见证过大陆的变迁。", length-min: 0.7, length-max: 1.8, material: SALMON }
  - { id: world_silent_depth, name: "{#37474f>}静默深渊{#263238<}", lore: "&7从不发出声响的鱼，栖息于世界最寂静的深海。", length-min: 0.6, length-max: 1.6, material: COD }
  - { id: world_coral_memory, name: "{#f8bbd9>}珊瑚记忆{#f48fb1<}", lore: "&7承载古老珊瑚礁记忆的灵鱼，鳞片如千年珊瑚。", length-min: 0.4, length-max: 1.0, material: TROPICAL_FISH }
  - { id: world_glacier_heart, name: "{#b3e5fc>}冰川之心{#4fc3f7<}", lore: "&7北地冰川深处的冰心之灵，触碰如触寒冰之魂。", length-min: 0.7, length-max: 1.7, material: SALMON }
  - { id: world_delta_soul, name: "{#ffb74d>}河口之魂{#ffa726<}", lore: "&7汇聚百川的河口孕育之灵，身负万千支流的记忆。", length-min: 0.5, length-max: 1.3, material: COD }
  - { id: world_archipelago_echo, name: "{#90caf9>}群岛回响{#64b5f6<}", lore: "&7在群岛间回荡的传说之鱼，其存在如海风中的低语。", length-min: 0.6, length-max: 1.5, material: TROPICAL_FISH }
