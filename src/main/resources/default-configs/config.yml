# SnowTerritory 主配置
# 模块配置位于 plugins/SnowTerritory/{模块}/ 目录

# ============================================
# 模块开关
# ============================================
# 设置为 false 可关闭对应模块
modules:
  reinforce: true
  enderstorage: true
  quest: true
  stocks: true

# ============================================
# 消息配置（全局，供 MessageUtils 使用）
# ============================================
# 所有聊天栏消息都可以在这里自定义
# 
# 支持的颜色代码格式:
#   - 传统颜色代码: &0-&9, &a-&f, &k-&r, &l-&o
#   - 16进制颜色: &{#FFFFFF} 或 <#FFFFFF>
#     示例: &{#FF0000} (红色), <#00FF00> (绿色)
#   - 渐变颜色:
#     * 标准格式: <GRADIENT:#FF6600:#FF6600>Text</GRADIENT> 或 <g:#1f2fa6:#91c8ff>Text</g>
#     * 自定义格式: {#314eb5>}Text{#8fdaff<}
#     * 多层渐变: {#314eb5>}Text1{#c294ff<>} Text2{#8fdaff<}
#     示例: 
#       - <GRADIENT:#FF0000:#0000FF>Gradient Text</GRADIENT> (红到蓝渐变)
#       - {#FF0000>}Hello{#0000FF<} (红到蓝渐变)
#       - {#FF0000>}First{#00FF00<>} Second{#0000FF<} (三色渐变)
# 
# 支持占位符: {占位符名} 会被自动替换为实际值
# 
# 占位符说明:
#   {label}    - 命令标签 (如: "sn" 或 "snowterritory")
#   {cost}     - 消耗数量 (金币/点券)
#   {count}    - 材料数量
#   {level}    - 强化等级 (数字)
#   {error}    - 错误消息文本
#   {type}     - 物品类型 (如: "SWORD", "AXE")
#   {id}       - 物品ID (MMOItems物品的唯一标识符)
# ============================================
messages:
  # 消息前缀 (所有带前缀的消息都会使用这个前缀)
  prefix: "&{#4a95ff}ST <g:#C97759:#C9AE59>Reinforce</g> &{#4a95ff}&l>&{#99c2ff}&l>&{#ffffff}&l> "
  
  # 命令相关消息
  command:
    # 无权限提示
    no-permission: "&c✗ &f您没有权限使用此命令！"
    # 仅限玩家使用的提示
    player-only: "&c✗ &f此命令仅限玩家使用！"
    # 未知命令提示
    # 占位符: {label} - 命令标签
    unknown-command: "&c✗ &f未知的子命令！输入 /{label} 查看帮助。"
    # 重载成功提示
    reload-success: "&a✓ &f插件配置已重载！"
    
  # 强化/任务/GUI 消息由各模块配置提供（reinforce/config.yml、quest/messages/zh_CN.yml）
    
  # 物品信息相关消息（全局，checkid 等命令使用）
  item:
    # 未手持物品提示
    no-item: "&c✗ &f请手持一个物品！"
    # 非MMOItems物品提示
    not-mmoitem: "&e⚠ &f这不是一个 MMOItems 物品！"
    # 获取物品信息错误提示
    # 占位符: {error} - 错误消息文本 (仅在异常时使用)
    info-error: "&c✗ &f无法获取物品信息！"
    # 物品信息标题
    info-title: "物品信息"
    # 物品类型显示
    # 占位符: {type} - 物品类型 (如: "SWORD", "AXE", "BOW")
    info-type: "&6类型: &f{type}"
    # 物品ID显示
    # 占位符: {id} - MMOItems物品的唯一标识符
    info-id: "&6 ID: &e&l{id}"
    
  # 帮助信息
  help:
    # 帮助标题
    title: "SnowTerritory 命令帮助"
    # 强化命令帮助
    reinforce: "&e/sn reinforce &7- &f打开物品强化界面"
    # 重载命令帮助
    reload: "&e/sn reload &7- &f重载插件配置"
    # 查看ID命令帮助
    checkid: "&e/sn checkID &7- &f查看手中物品的MMOItems ID"
    # 战利品仓库命令帮助
    enderstorage: "&e/sn es &7- &f打开战利品仓库界面"
  
  # 分隔线 (用于美化消息显示)
  separator: "&8&m                                        "

  # 调试命令
  debug:
    usage: "&e用法: /sn debug resetconfig [模块] &7(不指定则删除整个配置目录，保留数据库)"
    confirm-prompt: "&e⚠ &f确定要删除 {module} 的配置并重载吗？&c输入 yes 确认&f，30秒内有效"
    invalid-module: "&c✗ &f未知模块: {module}，可选: reinforce, enderstorage, quest, stocks, all"
    resetconfig-success: "&a✓ &f已删除 {module} {count} 个配置文件并重载（数据库已保留）"

